name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: webhook_pipeline
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 2004
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d webhook_pipeline"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      PORT: 3000
      DATABASE_URL: postgres://postgres:2004@localhost:5432/webhook_pipeline
      API_KEY: test-secret-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run migrate

      - name: Build
        run: npm run build
